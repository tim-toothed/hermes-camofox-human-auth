name: camofox-vnc

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate distribution files
        run: |
          test -f docker-compose.yml
          test -f skills/camofox-vnc-auth/SKILL.md
          test -f hermes_plugin/plugin.yaml
          python - <<'PY'
          import pathlib, yaml
          skill = pathlib.Path('skills/camofox-vnc-auth/SKILL.md').read_text()
          assert skill.startswith('---') and 'name: camofox-vnc-auth' in skill
          yaml.safe_load(pathlib.Path('hermes_plugin/plugin.yaml').read_text())
          PY

      - name: Build patched Camofox source
        run: |
          mkdir -p vendor
          git clone --depth 1 --branch master https://github.com/jo-inc/camofox-browser.git vendor/camofox-browser
          test "$(git -C vendor/camofox-browser rev-parse HEAD)" = "ce3a3b085aacba73eb8de6c51733c19fb13bfae4"
          for patch in patches/*.patch; do
            (cd vendor/camofox-browser && git apply --ignore-space-change --ignore-whitespace "$GITHUB_WORKSPACE/$patch")
          done
          docker build -t camofox-browser:vnc vendor/camofox-browser
